name: CI

on:
  pull_request:
    branches: [test, main]
  push:
    branches: [test]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  pr-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        id: lint
        run: pnpm lint
        continue-on-error: true

      - name: Run test
        id: test
        run: pnpm test
        continue-on-error: true

      - name: Run build
        id: build
        run: pnpm build
        continue-on-error: true

      - name: Add CI result comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        env:
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        with:
          script: |
            const marker = '<!-- ci-build-result-comment -->';

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const lintOutcome = process.env.LINT_OUTCOME;
            const testOutcome = process.env.TEST_OUTCOME;
            const buildOutcome = process.env.BUILD_OUTCOME;

            const allPassed = [lintOutcome, testOutcome, buildOutcome].every(
              (outcome) => outcome === 'success',
            );

            const summary = allPassed
              ? '✅ 모든 검증을 통과했습니다'
              : '❌ 일부 검증이 실패했습니다';

            const getMessage = (name, outcome) => {
              return outcome === 'success'
                ? `- ${name}: 성공 ✅`
                : `- ${name}: 실패 ❌`;
            };

            const body = [
              marker,
              '### CI 검증 결과',
              summary,
              '',
              getMessage('Lint', lintOutcome),
              getMessage('Test', testOutcome),
              getMessage('Build', buildOutcome),
              '',
              `[상세 로그 확인](https://github.com/${owner}/${repo}/actions/runs/${context.runId})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
            });

            const previousComment = comments.find((comment) => {
              return comment.user?.type === 'Bot' && comment.body?.includes(marker);
            });

            if (previousComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previousComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Check CI status
        if: steps.lint.outcome == 'failure' || steps.test.outcome == 'failure' || steps.build.outcome == 'failure'
        run: exit 1
